<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colour Therapy Module</title>
<style>
  body{background:#0a0a0d;color:#ddd;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:24px;display:flex;justify-content:center;}
  .wrap{max-width:760px;width:100%;}
  button{background:#1b1b20;border:1px solid #333;color:#ddd;border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;}
  button:hover{background:#27272d;}
  .mode-btn.active{background:#2c4256;color:#bfe0ff;border-color:#3d6f96;}
  .cat-btn.active{background:#27272d;font-weight:600;}
  .row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
  .ct-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .ct-row label{font-size:13px;color:#999;width:90px;flex-shrink:0;}
  .ct-row span{font-size:13px;font-weight:500;min-width:36px;text-align:right;}
  .ct-row input[type=range]{flex:1;}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;}
  #gl{width:100%;height:420px;border-radius:12px;display:block;background:#000;}
  #gl.soft-full{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;border-radius:0;}
  #panel{display:none;margin-top:1rem;padding:1rem 1.25rem;border:1px solid #333;border-radius:12px;background:#141418;}
  #breath-label{display:none;text-align:center;font-size:13px;color:#999;margin-top:8px;}
  #music-panel{display:none;margin-top:10px;}
  h1{font-size:16px;font-weight:600;color:#eee;margin:0 0 16px;}
  .note{font-size:12px;color:#777;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
<h1>Colour Therapy Module</h1>

<div class="row" style="margin-bottom:8px;">
  <button class="cat-btn active" id="cat-practical">Practical</button>
  <button class="cat-btn" id="cat-pleasure">Pleasure</button>
  <div style="flex:1"></div>
  <button class="icon-btn" id="toggle-music" aria-label="Music"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9 17V5l11-2v12"/><circle cx="6" cy="17" r="3"/><circle cx="17" cy="15" r="3"/></svg></button>
  <button class="icon-btn" id="toggle-full" aria-label="Fullscreen"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 3H3v6M15 3h6v6M9 21H3v-6M15 21h6v-6"/></svg></button>
  <button class="icon-btn" id="toggle-pause" aria-label="Pause"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
  <button id="toggle-panel">Tune</button>
</div>

<div class="row" id="row-practical">
  <button class="mode-btn" data-mode="calm">Calm</button>
  <button class="mode-btn" data-mode="energise">Energise</button>
  <button class="mode-btn" data-mode="focus">Focus</button>
  <button class="mode-btn" data-mode="sleep">Sleep</button>
  <button class="mode-btn" data-mode="flow">Flow</button>
  <button class="mode-btn" data-mode="anxiety">Anxiety ease</button>
</div>
<div class="row" id="row-pleasure" style="display:none;">
  <button class="mode-btn" data-mode="aurora">Aurora</button>
  <button class="mode-btn" data-mode="underwater">Underwater</button>
  <button class="mode-btn" data-mode="deepspace">Deep space</button>
  <button class="mode-btn" data-mode="mystic">Mystical</button>
  <button class="mode-btn" data-mode="psychedelia">Psychedelia</button>
  <button class="mode-btn" data-mode="fractal">Fractal infinity</button>
  <button class="mode-btn" data-mode="fizz">Fizz bomb</button>
  <button class="mode-btn" data-mode="future">22nd century</button>
</div>

<canvas id="gl"></canvas>
<div id="breath-label">Breathe in</div>
<div id="gl-error" style="display:none; padding:1rem; font-size:13px; color:#999;">WebGL is not available in this browser.</div>

<div id="music-panel">
  <iframe width="100%" height="80" src="https://www.youtube.com/embed/tRsQsTMvPNg" title="Claude FM" frameborder="0" allow="autoplay; encrypted-media" style="border-radius:12px; display:block;"></iframe>
  <div class="note">Claude FM — press play in the player above (autoplay is blocked by browsers until you interact with it).</div>
</div>

<div id="panel">
  <div class="ct-row">
    <label for="sp">Speed</label>
    <input type="range" id="sp" min="0.1" max="3" step="0.05" value="0.5">
    <span id="sp-out">0.50</span>
  </div>
  <div class="ct-row" style="margin-bottom:0;">
    <label for="in">Intensity</label>
    <input type="range" id="in" min="0.1" max="1.2" step="0.05" value="0.5">
    <span id="in-out">0.50</span>
  </div>
</div>
</div>

<script>
const MODES = {
  calm:{cat:'practical', label:'Calm', speed:0.4, intensity:0.5, idx:0},
  energise:{cat:'practical', label:'Energise', speed:1.3, intensity:0.8, idx:1},
  focus:{cat:'practical', label:'Focus', speed:0.4, intensity:0.4, idx:2},
  sleep:{cat:'practical', label:'Sleep', speed:0.3, intensity:0.4, idx:3},
  flow:{cat:'practical', label:'Flow', speed:0.55, intensity:0.55, idx:4},
  anxiety:{cat:'practical', label:'Anxiety ease', speed:0.5, intensity:0.5, idx:5, breathing:true},
  aurora:{cat:'pleasure', label:'Aurora', speed:0.45, intensity:0.75, idx:6},
  underwater:{cat:'pleasure', label:'Underwater', speed:0.55, intensity:0.65, idx:7},
  deepspace:{cat:'pleasure', label:'Deep space', speed:0.3, intensity:0.7, idx:8},
  mystic:{cat:'pleasure', label:'Mystical', speed:0.4, intensity:0.7, idx:9},
  psychedelia:{cat:'pleasure', label:'Psychedelia', speed:0.9, intensity:0.9, idx:10},
  fractal:{cat:'pleasure', label:'Fractal infinity', speed:0.6, intensity:0.85, idx:11},
  fizz:{cat:'pleasure', label:'Fizz bomb', speed:1.1, intensity:0.85, idx:12},
  future:{cat:'pleasure', label:'22nd century', speed:0.4, intensity:0.75, idx:13}
};

const VERT = `
attribute vec2 aPos;
varying vec2 vUv;
void main(){
  vUv = aPos*0.5+0.5;
  gl_Position = vec4(aPos,0.0,1.0);
}`;

const SCENE_FRAG = `
precision highp float;
varying vec2 vUv;
uniform float uTime;
uniform float uIntensity;
uniform int uMode;
uniform vec2 uResolution;
uniform sampler2D uPrev;

float hash(vec2 p){
  p = fract(p*vec2(123.34,456.21));
  p += dot(p,p+45.32);
  return fract(p.x*p.y);
}
float noise(vec2 p){
  vec2 i=floor(p); vec2 f=fract(p);
  float a=hash(i), b=hash(i+vec2(1.0,0.0)), c=hash(i+vec2(0.0,1.0)), d=hash(i+vec2(1.0,1.0));
  vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<5;i++){ v+=a*noise(p); p=p*2.02+vec2(13.1,7.3); a*=0.55; }
  return v;
}
vec2 warp2(vec2 p, float t, float sc, float sp){
  vec2 q=vec2(fbm(p*sc), fbm(p*sc+vec2(5.2,1.3)));
  vec2 r=vec2(fbm(p*sc+4.0*q+vec2(1.7,9.2)+t*sp), fbm(p*sc+4.0*q+vec2(8.3,2.8)+t*sp*0.8));
  return r;
}
float warpf(vec2 p, float t, float sc, float sp){
  vec2 r=warp2(p,t,sc,sp);
  return fbm(p*sc+4.0*r);
}
vec3 pal(float t, vec3 a, vec3 b, vec3 c, vec3 d){
  return a+b*cos(6.28318*(c*t+d));
}

void main(){
  vec2 uv=vUv;
  vec2 p=(uv*2.0-1.0);
  p.x*=uResolution.x/uResolution.y;
  float rad=length(p);
  float ang=atan(p.y,p.x);
  vec3 col=vec3(0.0);
  float decay=0.3, weight=0.7;
  vec3 A,B,C,D;

  if(uMode==0){
    decay=0.3; weight=0.7;
    vec2 wp=p*vec2(0.6,1.0);
    float f=sin(wp.y*2.2+sin(wp.x*1.3+uTime*0.6)*1.2+uTime*0.9)*0.5+0.5;
    A=vec3(0.20,0.40,0.42); B=vec3(0.18,0.28,0.28); C=vec3(0.6,0.6,0.6); D=vec3(0.4,0.55,0.6);
    col=pal(f,A,B,C,D)*(0.5+0.5*uIntensity);
  } else if(uMode==1){
    decay=0.8; weight=0.22;
    float sweep=cos(ang-uTime*1.4);
    float f=warpf(p+rad*0.4, uTime, 0.7, 0.15);
    A=vec3(0.55,0.30,0.15); B=vec3(0.35,0.25,0.15); C=vec3(0.8,0.7,0.5); D=vec3(0.0,0.05,0.1);
    col=pal(f+sweep*0.15-uTime*0.05, A,B,C,D)*(0.6+0.5*uIntensity);
  } else if(uMode==2){
    decay=0.3; weight=0.7;
    float f=sin(p.x*2.0+sin(uTime*0.8)*1.0)*0.5+sin(p.y*1.8-uTime*1.0)*0.3;
    f=f*0.5+0.5;
    A=vec3(0.18,0.20,0.22); B=vec3(0.16,0.18,0.18); C=vec3(0.3,0.3,0.3); D=vec3(0.5,0.5,0.55);
    col=pal(f,A,B,C,D)*(0.45+0.5*uIntensity);
  } else if(uMode==3){
    decay=0.3; weight=0.7;
    float f=sin(p.x*1.0+uTime*1.0)*0.5+sin(p.y*0.8-uTime*0.8)*0.3;
    f=f*0.5+0.5;
    A=vec3(0.06,0.06,0.14); B=vec3(0.10,0.10,0.16); C=vec3(0.3,0.3,0.3); D=vec3(0.55,0.55,0.65);
    col=pal(f,A,B,C,D)*(0.4+0.4*uIntensity);
  } else if(uMode==4){
    decay=0.3; weight=0.7;
    vec2 d1=vec2(0.7,0.7), d2=vec2(-0.7,0.7);
    float f=sin(dot(p,d1)*4.0+uTime*0.8)*0.5+sin(dot(p,d2)*3.0-uTime*0.5)*0.3;
    f=f*0.5+0.5;
    A=vec3(0.20,0.18,0.30); B=vec3(0.22,0.18,0.28); C=vec3(0.6,0.5,0.7); D=vec3(0.2,0.4,0.6);
    col=pal(f,A,B,C,D)*(0.5+0.5*uIntensity);
  } else if(uMode==5){
    decay=0.3; weight=0.7;
    float breath=0.28+0.14*(0.5+0.5*sin(uTime*1.1));
    float d=abs(rad-breath);
    float glow=exp(-pow(d*4.0,2.0));
    float bgf=sin(p.x*1.0+uTime*0.4)*0.5+sin(p.y*0.9-uTime*0.3)*0.3; bgf=bgf*0.5+0.5;
    vec3 bg=vec3(0.04,0.08,0.09)+vec3(0.05,0.10,0.10)*bgf;
    vec3 ring=vec3(0.3,0.65,0.65)*glow*(0.8+0.6*uIntensity);
    col=bg+ring;
  } else if(uMode==6){
    decay=0.95; weight=0.13;
    for(int i=0;i<6;i++){
      float fi=float(i);
      float baseX=-0.8+fi*0.32;
      float ripple=sin(p.y*1.5+uTime*0.3+fi*1.1)*0.25+sin(p.y*4.0-uTime*0.6+fi*0.7)*0.08;
      float xi=baseX+ripple;
      float strand=exp(-pow((p.x-xi)*6.0,2.0));
      float shimmer=sin(p.y*6.0-uTime*2.0+fi*2.2)*0.5+0.5;
      float vert=smoothstep(-1.0,0.2,p.y)*smoothstep(1.0,0.0,p.y);
      vec3 sc=mix(vec3(0.1,1.0,0.55), vec3(0.55,0.2,0.9), fi/5.0);
      col+=strand*shimmer*sc*vert;
    }
    col*=(1.4+1.0*uIntensity);
    float star=step(0.997, hash(floor(p*300.0)+floor(uTime*0.3)));
    col+=vec3(0.8,0.85,1.0)*star*0.5;
  } else if(uMode==7){
    decay=0.92; weight=0.15;
    float c1=cos(p.x*8.0+uTime*0.9);
    float c2=cos(p.y*7.0-uTime*0.7+p.x*2.0);
    float caustic=c1*c2;
    float shaft=pow(max(0.0,cos(p.x*2.0+sin(uTime*0.25)*1.5)),6.0);
    vec3 base=mix(vec3(0.03,0.12,0.16), vec3(0.05,0.30,0.32), p.y*0.5+0.5);
    vec3 sparkle=vec3(0.5,0.85,0.9)*pow(max(0.0,caustic),4.0)*0.8;
    col=base+sparkle+vec3(0.3,0.6,0.65)*shaft*0.4;
    col*=(0.8+0.6*uIntensity);
  } else if(uMode==8){
    decay=0.96; weight=0.09;
    vec3 base=vec3(0.01,0.01,0.03);
    float s1=step(0.998, hash(floor(p*260.0)+floor(uTime*0.4)));
    float s2=step(0.996, hash(floor(p*150.0)+floor(uTime*0.25)+17.0));
    float s3=step(0.985, hash(floor(p*90.0)+floor(uTime*0.15)+41.0));
    vec3 starcol=vec3(0.9,0.95,1.0)*s1*1.6+vec3(0.8,0.85,1.0)*s2*1.1+vec3(0.6,0.7,0.9)*s3*0.5;
    vec2 n1=vec2(sin(uTime*0.1)*0.5, cos(uTime*0.08)*0.4);
    vec2 n2=vec2(cos(uTime*0.09)*0.6-0.2, sin(uTime*0.11)*0.35+0.2);
    vec2 n3=vec2(sin(uTime*0.07+2.0)*0.4+0.3, cos(uTime*0.1+1.0)*0.5-0.2);
    float w1=warpf(p-n1,uTime,1.2,0.05);
    float g1=pow(exp(-length(p-n1)*2.2),1.5)*(0.6+0.5*w1);
    float g2=pow(exp(-length(p-n2)*2.6),1.5);
    float g3=pow(exp(-length(p-n3)*2.4),1.5);
    vec3 neb=vec3(0.7,0.2,0.9)*g1*1.3+vec3(0.2,0.5,1.0)*g2*1.1+vec3(1.0,0.4,0.3)*g3*0.9;
    col=base+starcol+neb*(0.7+0.7*uIntensity);
  } else if(uMode==9){
    decay=0.96; weight=0.09;
    float seg=3.14159265*2.0/12.0;
    float a2=mod(ang+uTime*0.08,seg); a2=abs(a2-seg*0.5);
    float ring1=sin(rad*14.0-uTime*0.8)*0.5+0.5;
    float ring2=sin(rad*7.0+uTime*0.5)*0.5+0.5;
    float spokeGlow=exp(-pow(a2*8.0,2.0));
    float core=exp(-rad*2.5);
    float f=ring1*0.35+ring2*0.25+spokeGlow*0.4;
    A=vec3(0.05,0.02,0.10); B=vec3(0.30,0.18,0.35); C=vec3(0.55,0.35,0.6); D=vec3(0.7,0.4,0.85);
    col=pal(f,A,B,C,D)*(0.9+0.7*uIntensity);
    col+=vec3(0.7,0.45,0.9)*core*0.8;
    float spark=step(0.992, hash(floor(p*220.0)+floor(uTime*1.6)));
    float sparkDrift=step(0.991, hash(floor((p+vec2(sin(uTime*0.3),cos(uTime*0.25))*0.05)*180.0)+floor(uTime*1.2)+5.0));
    col+=vec3(1.0,0.9,0.6)*spark*1.3;
    col+=vec3(0.9,0.7,1.0)*sparkDrift*1.0;
  } else if(uMode==10){
    float seg=3.14159265*2.0/6.0;
    float a2=mod(ang,seg); a2=abs(a2-seg*0.5);
    vec2 kp=vec2(cos(a2),sin(a2))*rad;
    float f=fbm(kp*3.0-uTime*0.5);
    decay=0.9; weight=0.16;
    A=vec3(0.5,0.5,0.5); B=vec3(0.5,0.5,0.5); C=vec3(1.0,1.0,1.0); D=vec3(0.0,0.33,0.67);
    col=pal(f+rad*0.6-uTime*0.15,A,B,C,D)*(0.8+0.6*uIntensity);
  } else if(uMode==11){
    decay=0.3; weight=0.7;
    vec2 offp=vec2(sin(uTime*0.05), cos(uTime*0.04))*0.18;
    float zoom=1.3+0.5*sin(uTime*0.09);
    vec2 cpos=(p+offp)*zoom-vec2(0.4,0.0);
    vec2 cc=0.7885*vec2(cos(uTime*0.15), sin(uTime*0.15));
    vec2 z=cpos;
    float m=0.0;
    for(int i=0;i<40;i++){
      z=vec2(z.x*z.x-z.y*z.y, 2.0*z.x*z.y)+cc;
      if(dot(z,z)>4.0) break;
      m+=1.0;
    }
    float tt=m/40.0;
    A=vec3(0.5,0.5,0.5); B=vec3(0.5,0.5,0.5); C=vec3(1.0,1.0,0.8); D=vec3(0.3,0.2,0.6);
    if(m>39.5){ col=vec3(0.0); } else { col=pal(tt*2.5+uTime*0.08,A,B,C,D)*(0.6+0.6*uIntensity); }
  } else if(uMode==12){
    decay=0.86; weight=0.2;
    float v=0.0;
    for(int i=0;i<5;i++){
      float fi=float(i);
      vec2 c=vec2(sin(uTime*0.7+fi*1.7), cos(uTime*0.55+fi*2.1))*0.55;
      v+=smoothstep(0.35,0.0,length(p-c));
    }
    A=vec3(0.6,0.55,0.65); B=vec3(0.35,0.35,0.35); C=vec3(0.8,0.9,0.7); D=vec3(0.1,0.3,0.5);
    col=pal(v+uTime*0.15,A,B,C,D)*(0.5+0.7*v)*(0.6+0.6*uIntensity);
  } else if(uMode==13){
    decay=0.88; weight=0.18;
    float f=warpf(p,uTime,0.9,0.12);
    vec2 r2=warp2(p,uTime,0.9,0.12);
    float sheenBand=exp(-pow(((p.x+p.y)*0.5-fract(uTime*0.15)*2.4+1.2)*3.0,2.0));
    A=vec3(0.5,0.5,0.5); B=vec3(0.5,0.5,0.5); C=vec3(1.0,1.0,1.0); D=vec3(0.15,0.45,0.75);
    col=pal(f*1.5+r2.x*0.8,A,B,C,D)*(0.6+0.5*uIntensity)+vec3(1.0)*sheenBand*0.8;
  }

  vec3 prev=texture2D(uPrev, uv).rgb;
  vec3 outc=prev*decay+col*weight;
  gl_FragColor=vec4(outc,1.0);
}`;

const DISPLAY_FRAG = `
precision highp float;
varying vec2 vUv;
uniform sampler2D uTex;
void main(){
  vec3 c=texture2D(uTex, vUv).rgb;
  c=c/(1.0+c);
  c=pow(c, vec3(1.0/1.9));
  gl_FragColor=vec4(c,1.0);
}`;

function compile(gl, src, type){
  const s=gl.createShader(type);
  gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
function makeProgram(gl, vsrc, fsrc){
  const p=gl.createProgram();
  gl.attachShader(p, compile(gl,vsrc,gl.VERTEX_SHADER));
  gl.attachShader(p, compile(gl,fsrc,gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
  return p;
}
function makeFBO(gl,w,h){
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fb=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return {fb,tex};
}

const canvas=document.getElementById('gl');
let gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
if(!gl){
  document.getElementById('gl-error').style.display='block';
} else {
  canvas.width=canvas.clientWidth||680;
  canvas.height=420;

  const quad=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,quad);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

  const sceneProg=makeProgram(gl,VERT,SCENE_FRAG);
  const dispProg=makeProgram(gl,VERT,DISPLAY_FRAG);

  let fboA=makeFBO(gl,canvas.width,canvas.height);
  let fboB=makeFBO(gl,canvas.width,canvas.height);

  function clearFBO(fbo){
    gl.bindFramebuffer(gl.FRAMEBUFFER,fbo.fb);
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.clearColor(0,0,0,1);
    gl.clear(gl.COLOR_BUFFER_BIT);
  }
  clearFBO(fboA); clearFBO(fboB);

  function resizeCanvasTo(w,h){
    canvas.width=Math.max(1,Math.floor(w));
    canvas.height=Math.max(1,Math.floor(h));
    fboA=makeFBO(gl,canvas.width,canvas.height);
    fboB=makeFBO(gl,canvas.width,canvas.height);
    clearFBO(fboA); clearFBO(fboB);
  }

  const state=Object.assign({mode:'calm', t:0, paused:false}, MODES.calm);

  function bindQuad(prog){
    const loc=gl.getAttribLocation(prog,'aPos');
    gl.bindBuffer(gl.ARRAY_BUFFER,quad);
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  }

  function render(){
    const def=MODES[state.mode];
    const target = (state._flip ? fboA : fboB);
    const source = (state._flip ? fboB : fboA);

    gl.bindFramebuffer(gl.FRAMEBUFFER, target.fb);
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.useProgram(sceneProg);
    bindQuad(sceneProg);
    gl.uniform1f(gl.getUniformLocation(sceneProg,'uTime'), state.t);
    gl.uniform1f(gl.getUniformLocation(sceneProg,'uIntensity'), state.intensity);
    gl.uniform1i(gl.getUniformLocation(sceneProg,'uMode'), def.idx);
    gl.uniform2f(gl.getUniformLocation(sceneProg,'uResolution'), canvas.width, canvas.height);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, source.tex);
    gl.uniform1i(gl.getUniformLocation(sceneProg,'uPrev'), 0);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0,0,canvas.width,canvas.height);
    gl.useProgram(dispProg);
    bindQuad(dispProg);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, target.tex);
    gl.uniform1i(gl.getUniformLocation(dispProg,'uTex'), 0);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    state._flip = !state._flip;

    if(def.breathing){
      document.getElementById('breath-label').textContent = Math.cos(state.t*1.1)>0 ? 'Breathe in' : 'Breathe out';
    }
  }

  let last=performance.now();
  function loop(now){
    const dt=Math.min(0.1,(now-last)/1000); last=now;
    if(!state.paused) state.t += dt*state.speed*0.6;
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function setMode(name){
    const def=MODES[name];
    state.mode=name; state.speed=def.speed; state.intensity=def.intensity;
    document.getElementById('sp').value=def.speed;
    document.getElementById('sp-out').textContent=def.speed.toFixed(2);
    document.getElementById('in').value=def.intensity;
    document.getElementById('in-out').textContent=def.intensity.toFixed(2);
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b.dataset.mode===name));
    document.getElementById('breath-label').style.display = def.breathing ? 'block' : 'none';
    clearFBO(fboA); clearFBO(fboB);
  }
  document.querySelectorAll('.mode-btn').forEach(b=>{
    b.addEventListener('click', ()=>setMode(b.dataset.mode));
  });
  setMode('calm');

  document.getElementById('sp').addEventListener('input', e=>{
    state.speed=parseFloat(e.target.value);
    document.getElementById('sp-out').textContent=state.speed.toFixed(2);
  });
  document.getElementById('in').addEventListener('input', e=>{
    state.intensity=parseFloat(e.target.value);
    document.getElementById('in-out').textContent=state.intensity.toFixed(2);
  });
  document.getElementById('toggle-pause').addEventListener('click', e=>{
    state.paused=!state.paused;
    e.currentTarget.innerHTML = state.paused
      ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>'
      : '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  });

  document.getElementById('toggle-full').addEventListener('click', ()=>{
    if(!document.fullscreenElement){
      if(canvas.requestFullscreen){
        canvas.requestFullscreen().catch(()=>{ canvas.classList.toggle('soft-full'); resizeCanvasTo(window.innerWidth,window.innerHeight); });
      } else {
        canvas.classList.toggle('soft-full');
        resizeCanvasTo(window.innerWidth,window.innerHeight);
      }
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', ()=>{
    if(document.fullscreenElement===canvas){
      resizeCanvasTo(window.innerWidth, window.innerHeight);
    } else if(!canvas.classList.contains('soft-full')){
      resizeCanvasTo(canvas.clientWidth||680, 420);
    }
  });
  canvas.addEventListener('dblclick', ()=>{
    if(canvas.classList.contains('soft-full')){
      canvas.classList.remove('soft-full');
      resizeCanvasTo(canvas.clientWidth||680, 420);
    }
  });

  window.addEventListener('resize', ()=>{
    if(!document.fullscreenElement && !canvas.classList.contains('soft-full')){
      resizeCanvasTo(canvas.clientWidth||680, 420);
    }
  });
}

document.getElementById('toggle-panel').addEventListener('click', ()=>{
  const p=document.getElementById('panel');
  p.style.display = p.style.display==='none' ? 'block' : 'none';
});
document.getElementById('toggle-music').addEventListener('click', ()=>{
  const p=document.getElementById('music-panel');
  p.style.display = p.style.display==='none' ? 'block' : 'none';
});
function setCategory(cat){
  document.getElementById('row-practical').style.display = cat==='practical' ? 'flex' : 'none';
  document.getElementById('row-pleasure').style.display = cat==='pleasure' ? 'flex' : 'none';
  document.getElementById('cat-practical').classList.toggle('active', cat==='practical');
  document.getElementById('cat-pleasure').classList.toggle('active', cat==='pleasure');
}
document.getElementById('cat-practical').addEventListener('click', ()=>setCategory('practical'));
document.getElementById('cat-pleasure').addEventListener('click', ()=>setCategory('pleasure'));
</script>
</body>
